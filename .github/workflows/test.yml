name: Test Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run skill tests
        run: bash test-skills.sh

      - name: Generate skills catalog
        run: bash generate-catalog.sh

      - name: Generate setups catalog
        run: bash generate-setups.sh

      - name: Commit catalogs if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git diff --quiet skills.json setups.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json setups.json
          git commit -m "Update skills.json and setups.json catalogs"
          # Rebase before push to handle the race with build-pilotctl-skill,
          # which can land its own auto-commit between our checkout and push.
          for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then
                  exit 0
              fi
              echo "push attempt $attempt rejected, retrying..."
              sleep 2
          done
          echo "push failed after 3 attempts" >&2
          exit 1
