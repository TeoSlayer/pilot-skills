name: Test Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run skill tests
        run: bash test-skills.sh

      - name: Generate skills catalog
        run: bash generate-catalog.sh

      - name: Commit skills.json if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git diff --quiet skills.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json
          git commit -m "Update skills.json catalog"
          git push
